# pytorch_lightning==2.5.5
seed_everything: 703
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: 16-mixed
  logger:
  - class_path: pytorch_lightning.loggers.TensorBoardLogger
    init_args:
      save_dir: dummy
      name: null
      version: ''
      log_graph: false
      default_hp_metric: true
      prefix: ''
      sub_dir: null
      comment: ''
      purge_step: null
      max_queue: 10
      flush_secs: 120
      filename_suffix: ''
  callbacks:
  - class_path: pytorch_lightning.callbacks.ModelSummary
    init_args:
      max_depth: 3
  - class_path: pytorch_lightning.callbacks.LearningRateMonitor
    init_args:
      logging_interval: null
      log_momentum: false
      log_weight_decay: false
  - class_path: pytorch_lightning.callbacks.ModelCheckpoint
    init_args:
      dirpath: null
      filename: '{epoch}'
      monitor: val_score_epoch
      verbose: true
      save_last: false
      save_top_k: 1
      save_on_exception: false
      save_weights_only: false
      mode: max
      auto_insert_metric_name: true
      every_n_train_steps: null
      train_time_interval: null
      every_n_epochs: null
      save_on_train_epoch_end: null
      enable_version_counter: true
  fast_dev_run: false
  max_epochs: 15
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: 0.5
  gradient_clip_algorithm: norm
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
  model_registry: null
model:
  class_path: cafa.experiments.embedding_nn.model.EmbeddingNN
  init_args:
    dropout: 0.1
    lr: 0.001
    min_lr: 1.0e-05
    weight_decay: 0.01
    save_embeddings: false
    save_submission: false
    save_validation_epoch_outputs: false
    model_checkpoint_path: null
data:
  class_path: cafa.experiments.embedding_nn.datamodule.ProteinEmbeddingDataModule
  init_args:
    data_dir: null
    train_terms_path: null
    train_propagated_terms_path: null
    train_batch_size: 128
    val_batch_size: 512
    num_workers: 4
    fold_path: null
    fold: null
    train_seqs_path: null
    test_seqs_path: null
    embedding_paths: null
    checkpoint_path: null
    terms_evidence_path: null
    predict_proteins_path: null
    subontology: null
    val_dir: null
    stochastic_predict: false
optimizer: null
lr_scheduler: null
ckpt_path: null
